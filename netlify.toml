[build]
  command = "npm run build"
  publish = ".next"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[build.environment]
  NODE_VERSION = "20"
  NEXT_TELEMETRY_DISABLED = "1"

[[redirects]]
  from = "https://toromudanzas.com/*"
  to = "https://toromovers.net/?utm_source=toromudanzas&utm_medium=redirect"
  status = 301
  force = true

[[redirects]]
  from = "https://www.toromudanzas.com/*"
  to = "https://toromovers.net/?utm_source=toromudanzas&utm_medium=redirect"
  status = 301
  force = true

# Security hardening headers. Kept intentionally conservative so nothing on the
# live site breaks: clickjacking + MIME + referrer + feature-policy protection.
# (HSTS is already sent by Netlify. A full script/style CSP is a separate,
# test-heavy follow-up — only frame-ancestors is set here, which is safe.)
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), browsing-topics=()"
    Content-Security-Policy = "frame-ancestors 'self'"
